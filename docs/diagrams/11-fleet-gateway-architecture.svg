<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720" font-family="Arial, Helvetica, sans-serif">

  <!-- Definitions -->
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#BDC3C7" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8A838"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5BB55B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Fleet Gateway Architecture</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#7F8C8D">Phase 5 — Cloud-side Matter controller for delivery van fleets</text>

  <!-- ═══ REST API Layer (top) ═══ -->
  <rect x="30" y="65" width="840" height="75" rx="12" ry="12" fill="#F7F9FC" stroke="#4A90D9" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#4A90D9">GatewayServer — REST API</text>
  <text x="450" y="100" text-anchor="middle" font-size="10" fill="#2C3E50">HTTP/1.1 with path params, JSON body, X-Tenant-Id header</text>

  <!-- API endpoint groups -->
  <rect x="45" y="108" width="120" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1"/>
  <text x="105" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A90D9">Van CRUD</text>

  <rect x="175" y="108" width="120" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1"/>
  <text x="235" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#9B59B6">Commands</text>

  <rect x="305" y="108" width="120" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#E8A838" stroke-width="1"/>
  <text x="365" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#E8A838">Subscriptions</text>

  <rect x="435" y="108" width="120" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#5BB55B" stroke-width="1"/>
  <text x="495" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#5BB55B">Fleet Status</text>

  <rect x="565" y="108" width="100" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#E74C3C" stroke-width="1"/>
  <text x="615" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#E74C3C">Events</text>

  <rect x="675" y="108" width="90" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1"/>
  <text x="720" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#2C3E50">Tenants</text>

  <rect x="775" y="108" width="80" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#7F8C8D" stroke-width="1"/>
  <text x="815" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#7F8C8D">Health</text>

  <!-- ═══ Core Services Layer ═══ -->
  <rect x="30" y="160" width="840" height="210" rx="12" ry="12" fill="#FFF8E1" stroke="#E8A838" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#E8A838">Gateway Core Services</text>

  <!-- VanRegistry -->
  <rect x="50" y="192" width="175" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="137" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A90D9">VanRegistry</text>
  <line x1="60" y1="216" x2="215" y2="216" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="137" y="230" text-anchor="middle" font-size="9" fill="#2C3E50">CRUD + per-tenant filter</text>
  <text x="137" y="243" text-anchor="middle" font-size="9" fill="#2C3E50">JSON serialization</text>
  <text x="137" y="256" text-anchor="middle" font-size="9" fill="#7F8C8D">VanState: 6 lifecycle states</text>
  <rect x="55" y="260" width="50" height="10" rx="3" ry="3" fill="rgba(74,144,217,0.15)"/>
  <text x="80" y="268" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A90D9">8 TESTS</text>

  <!-- FabricManager -->
  <rect x="240" y="192" width="175" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="327" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#9B59B6">FabricManager</text>
  <line x1="250" y1="216" x2="405" y2="216" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="327" y="230" text-anchor="middle" font-size="9" fill="#2C3E50">Per-tenant fabric isolation</text>
  <text x="327" y="243" text-anchor="middle" font-size="9" fill="#2C3E50">NOC issuance (simulated)</text>
  <text x="327" y="256" text-anchor="middle" font-size="9" fill="#7F8C8D">canAccess() tenant check</text>
  <rect x="245" y="260" width="50" height="10" rx="3" ry="3" fill="rgba(155,89,182,0.15)"/>
  <text x="270" y="268" text-anchor="middle" font-size="7" font-weight="bold" fill="#9B59B6">8 TESTS</text>

  <!-- CASESessionPool -->
  <rect x="430" y="192" width="195" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#E8A838" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="527" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#E8A838">CASESessionPool</text>
  <line x1="440" y1="216" x2="615" y2="216" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="527" y="230" text-anchor="middle" font-size="9" fill="#2C3E50">Keepalive every 60s</text>
  <text x="527" y="243" text-anchor="middle" font-size="9" fill="#2C3E50">Exp. backoff: 5s → 5min</text>
  <text x="527" y="256" text-anchor="middle" font-size="9" fill="#7F8C8D">5 states, 10 max retries</text>
  <rect x="435" y="260" width="50" height="10" rx="3" ry="3" fill="rgba(232,168,56,0.15)"/>
  <text x="460" y="268" text-anchor="middle" font-size="7" font-weight="bold" fill="#E8A838">8 TESTS</text>

  <!-- OfflineBuffer -->
  <rect x="640" y="192" width="215" height="80" rx="8" ry="8" fill="#FFFFFF" stroke="#E74C3C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="747" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#E74C3C">OfflineBuffer</text>
  <line x1="650" y1="216" x2="845" y2="216" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="747" y="230" text-anchor="middle" font-size="9" fill="#2C3E50">Ring buffer: 10K/van, 100K total</text>
  <text x="747" y="243" text-anchor="middle" font-size="9" fill="#2C3E50">Monotonic seq IDs + age eviction</text>
  <text x="747" y="256" text-anchor="middle" font-size="9" fill="#7F8C8D">drain(since_seq), drainAll()</text>
  <rect x="645" y="260" width="50" height="10" rx="3" ry="3" fill="rgba(231,76,60,0.15)"/>
  <text x="670" y="268" text-anchor="middle" font-size="7" font-weight="bold" fill="#E74C3C">8 TESTS</text>

  <!-- FleetSubscriptionManager -->
  <rect x="50" y="285" width="365" height="75" rx="8" ry="8" fill="#FFFFFF" stroke="#5BB55B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="232" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="#5BB55B">FleetSubscriptionManager</text>
  <line x1="60" y1="309" x2="405" y2="309" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="232" y="323" text-anchor="middle" font-size="9" fill="#2C3E50">8 default rules: temp, humidity, door, lock, light, occupancy, battery, reefer</text>
  <text x="232" y="336" text-anchor="middle" font-size="9" fill="#2C3E50">Observer callbacks | 3-strike liveness | auto-resubscribe on failure</text>
  <text x="232" y="349" text-anchor="middle" font-size="9" fill="#7F8C8D">subscribeVan() applies all rules | unsubscribeVan() tears down</text>
  <rect x="55" y="350" width="50" height="10" rx="3" ry="3" fill="rgba(91,181,91,0.15)"/>
  <text x="80" y="358" text-anchor="middle" font-size="7" font-weight="bold" fill="#5BB55B">8 TESTS</text>

  <!-- CommandRelay -->
  <rect x="430" y="285" width="425" height="75" rx="8" ry="8" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="642" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="#9B59B6">CommandRelay</text>
  <line x1="440" y1="309" x2="845" y2="309" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="642" y="323" text-anchor="middle" font-size="9" fill="#2C3E50">invoke() | timedInvoke() | readAttribute() | writeAttribute()</text>
  <text x="642" y="336" text-anchor="middle" font-size="9" fill="#2C3E50">checkConnected() with session state info | touchActivity() on success</text>
  <text x="642" y="349" text-anchor="middle" font-size="9" fill="#7F8C8D">Lock/Unlock shortcuts: DoorLock 0x0101, cmds 0x0000/0x0001</text>
  <rect x="435" y="350" width="50" height="10" rx="3" ry="3" fill="rgba(155,89,182,0.15)"/>
  <text x="460" y="358" text-anchor="middle" font-size="7" font-weight="bold" fill="#9B59B6">6 TESTS</text>

  <!-- ═══ Hardware Bridge Layer ═══ -->
  <rect x="30" y="390" width="840" height="60" rx="12" ry="12" fill="#F3E5F5" stroke="#9B59B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="413" text-anchor="middle" font-size="13" font-weight="bold" fill="#9B59B6">ChipToolDriver (mt_hw)</text>
  <text x="450" y="428" text-anchor="middle" font-size="10" fill="#2C3E50">Sidecar subprocess: chip-tool CLI → fork/exec → parse stdout → Result types</text>
  <text x="450" y="441" text-anchor="middle" font-size="9" fill="#7F8C8D">establishCASE | invokeCommand | readAttribute | writeAttribute | subscribe | cancelSubscription</text>

  <!-- ═══ Connection arrows to vans ═══ -->
  <line x1="180" y1="450" x2="180" y2="480" stroke="#E8A838" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRight)"/>
  <line x1="370" y1="450" x2="370" y2="480" stroke="#E8A838" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRight)"/>
  <line x1="550" y1="450" x2="550" y2="480" stroke="#E8A838" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRight)"/>
  <line x1="730" y1="450" x2="730" y2="480" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="6,3"/>

  <text x="180" y="472" text-anchor="middle" font-size="8" fill="#E8A838">CASE</text>
  <text x="370" y="472" text-anchor="middle" font-size="8" fill="#E8A838">CASE</text>
  <text x="550" y="472" text-anchor="middle" font-size="8" fill="#E8A838">CASE</text>
  <text x="730" y="472" text-anchor="middle" font-size="8" fill="#7F8C8D">offline</text>

  <!-- ═══ Van Fleet ═══ -->
  <rect x="30" y="480" width="840" height="130" rx="12" ry="12" fill="#E8F5E9" stroke="#5BB55B" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#5BB55B">Delivery Van Fleet</text>

  <!-- Van 1 (Online) -->
  <rect x="60" y="510" width="200" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#5BB55B" stroke-width="1.5"/>
  <rect x="65" y="514" width="45" height="12" rx="3" ry="3" fill="rgba(91,181,91,0.15)"/>
  <text x="87" y="523" text-anchor="middle" font-size="7" font-weight="bold" fill="#5BB55B">ONLINE</text>
  <text x="160" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">VAN-001</text>
  <line x1="70" y1="536" x2="250" y2="536" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="160" y="550" text-anchor="middle" font-size="9" fill="#2C3E50">BR → Relay → Sensors</text>
  <text x="160" y="563" text-anchor="middle" font-size="8" fill="#7F8C8D">8 endpoints subscribed</text>
  <text x="160" y="576" text-anchor="middle" font-size="8" fill="#7F8C8D" font-family="monospace">Temp: 4.2°C | Door: Locked</text>
  <text x="160" y="589" text-anchor="middle" font-size="8" fill="#5BB55B">Tenant: Acme (Fabric 0x100000001)</text>

  <!-- Van 2 (Online) -->
  <rect x="275" y="510" width="200" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#5BB55B" stroke-width="1.5"/>
  <rect x="280" y="514" width="45" height="12" rx="3" ry="3" fill="rgba(91,181,91,0.15)"/>
  <text x="302" y="523" text-anchor="middle" font-size="7" font-weight="bold" fill="#5BB55B">ONLINE</text>
  <text x="375" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">VAN-002</text>
  <line x1="285" y1="536" x2="465" y2="536" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="375" y="550" text-anchor="middle" font-size="9" fill="#2C3E50">BR → Relay → Sensors</text>
  <text x="375" y="563" text-anchor="middle" font-size="8" fill="#7F8C8D">8 endpoints subscribed</text>
  <text x="375" y="576" text-anchor="middle" font-size="8" fill="#7F8C8D" font-family="monospace">Temp: 2.8°C | Door: Locked</text>
  <text x="375" y="589" text-anchor="middle" font-size="8" fill="#5BB55B">Tenant: Acme (Fabric 0x100000001)</text>

  <!-- Van 3 (Online, different tenant) -->
  <rect x="490" y="510" width="200" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1.5"/>
  <rect x="495" y="514" width="45" height="12" rx="3" ry="3" fill="rgba(74,144,217,0.15)"/>
  <text x="517" y="523" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A90D9">ONLINE</text>
  <text x="590" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">VAN-101</text>
  <line x1="500" y1="536" x2="680" y2="536" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="590" y="550" text-anchor="middle" font-size="9" fill="#2C3E50">BR → Relay → Sensors</text>
  <text x="590" y="563" text-anchor="middle" font-size="8" fill="#7F8C8D">8 endpoints subscribed</text>
  <text x="590" y="576" text-anchor="middle" font-size="8" fill="#7F8C8D" font-family="monospace">Temp: 18.5°C | Door: Open</text>
  <text x="590" y="589" text-anchor="middle" font-size="8" fill="#4A90D9">Tenant: Globex (Fabric 0x100000002)</text>

  <!-- Van 4 (Offline) -->
  <rect x="705" y="510" width="150" height="90" rx="8" ry="8" fill="#FFFFFF" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="710" y="514" width="50" height="12" rx="3" ry="3" fill="rgba(231,76,60,0.15)"/>
  <text x="735" y="523" text-anchor="middle" font-size="7" font-weight="bold" fill="#E74C3C">OFFLINE</text>
  <text x="780" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#7F8C8D">VAN-003</text>
  <line x1="715" y1="536" x2="845" y2="536" stroke="#BDC3C7" stroke-width="0.5"/>
  <text x="780" y="550" text-anchor="middle" font-size="9" fill="#7F8C8D">Cellular dead zone</text>
  <text x="780" y="563" text-anchor="middle" font-size="8" fill="#E74C3C">Reconnecting (attempt 3)</text>
  <text x="780" y="576" text-anchor="middle" font-size="8" fill="#7F8C8D">Backoff: 20s</text>
  <text x="780" y="589" text-anchor="middle" font-size="8" fill="#E74C3C">47 events buffered</text>

  <!-- ═══ Legend ═══ -->
  <rect x="30" y="625" width="840" height="85" rx="10" ry="10" fill="#F7F9FC" stroke="#BDC3C7" stroke-width="1"/>
  <text x="450" y="645" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Build Configuration</text>

  <!-- Build configs -->
  <rect x="55" y="655" width="240" height="20" rx="4" ry="4" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="1"/>
  <text x="175" y="669" text-anchor="middle" font-size="9" fill="#2C3E50">Default build: <tspan font-weight="bold">112 tests</tspan></text>

  <rect x="315" y="655" width="270" height="20" rx="4" ry="4" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1"/>
  <text x="450" y="669" text-anchor="middle" font-size="9" fill="#9B59B6">+ ENABLE_HW_BRIDGE: <tspan font-weight="bold">144 tests</tspan> (+32)</text>

  <rect x="605" y="655" width="250" height="20" rx="4" ry="4" fill="#FFFFFF" stroke="#E8A838" stroke-width="1"/>
  <text x="730" y="669" text-anchor="middle" font-size="9" fill="#E8A838">+ ENABLE_GATEWAY: <tspan font-weight="bold">206 tests</tspan> (+62)</text>

  <text x="450" y="700" text-anchor="middle" font-size="9" fill="#7F8C8D">mt_core → mt_net → mt_thread → mt_matter → mt_fault / mt_metrics → mt_hw → mt_gateway</text>

</svg>
