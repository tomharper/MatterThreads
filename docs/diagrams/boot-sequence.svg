<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace" font-size="12">
  <text x="400" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Cold Boot Sequence (Reverse Priority)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#999" stroke-width="1"/>
  <text x="40" y="65" font-size="11" fill="#666">Time</text>

  <!-- Nodes columns -->
  <text x="200" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#2196F3">BR (P=2, first)</text>
  <text x="400" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF9800">Relay (P=1)</text>
  <text x="600" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CAF50">Sensor (P=0, last)</text>

  <!-- Column lines -->
  <line x1="200" y1="60" x2="200" y2="360" stroke="#eee" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="60" x2="400" y2="360" stroke="#eee" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="60" x2="600" y2="360" stroke="#eee" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- T=0 Engine On -->
  <line x1="80" y1="80" x2="750" y2="80" stroke="#333" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="85" y="77" font-size="11" fill="#333" font-weight="bold">T=0s</text>
  <text x="750" y="77" font-size="11" fill="#333">Engine ON</text>

  <!-- Off bars -->
  <rect x="170" y="60" width="60" height="50" fill="#FFCDD2" stroke="#F44336" stroke-width="1" rx="3"/>
  <text x="200" y="90" text-anchor="middle" font-size="10" fill="#B71C1C">OFF</text>

  <rect x="370" y="60" width="60" height="110" fill="#FFCDD2" stroke="#F44336" stroke-width="1" rx="3"/>
  <text x="400" y="120" text-anchor="middle" font-size="10" fill="#B71C1C">OFF</text>

  <rect x="570" y="60" width="60" height="170" fill="#FFCDD2" stroke="#F44336" stroke-width="1" rx="3"/>
  <text x="600" y="150" text-anchor="middle" font-size="10" fill="#B71C1C">OFF</text>

  <!-- T=3s BR boots -->
  <line x1="80" y1="110" x2="750" y2="110" stroke="#aaa" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="85" y="107" font-size="11" fill="#333">T=3s</text>

  <rect x="170" y="110" width="60" height="25" fill="#BBDEFB" stroke="#2196F3" stroke-width="1" rx="3"/>
  <text x="200" y="127" text-anchor="middle" font-size="9" fill="#0D47A1">BOOT</text>
  <rect x="170" y="135" width="60" height="225" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="200" y="250" text-anchor="middle" font-size="10" fill="#2E7D32">ON</text>

  <text x="250" y="125" font-size="10" fill="#555">SRP server init</text>
  <text x="250" y="138" font-size="10" fill="#555">Cellular backhaul</text>
  <text x="250" y="151" font-size="10" fill="#555">PowerUp event</text>

  <!-- T=6s Relay boots -->
  <line x1="80" y1="170" x2="750" y2="170" stroke="#aaa" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="85" y="167" font-size="11" fill="#333">T=6s</text>

  <rect x="370" y="170" width="60" height="25" fill="#BBDEFB" stroke="#2196F3" stroke-width="1" rx="3"/>
  <text x="400" y="187" text-anchor="middle" font-size="9" fill="#0D47A1">BOOT</text>
  <rect x="370" y="195" width="60" height="165" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="400" y="280" text-anchor="middle" font-size="10" fill="#2E7D32">ON</text>

  <text x="450" y="185" font-size="10" fill="#555">Attach to BR</text>
  <text x="450" y="198" font-size="10" fill="#555">MLE advertise</text>
  <text x="450" y="211" font-size="10" fill="#555">Route rebuild</text>

  <!-- T=9s Sensor boots -->
  <line x1="80" y1="230" x2="750" y2="230" stroke="#aaa" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="85" y="227" font-size="11" fill="#333">T=9s</text>

  <rect x="570" y="230" width="60" height="25" fill="#BBDEFB" stroke="#2196F3" stroke-width="1" rx="3"/>
  <text x="600" y="247" text-anchor="middle" font-size="9" fill="#0D47A1">BOOT</text>
  <rect x="570" y="255" width="60" height="105" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1" rx="3"/>
  <text x="600" y="310" text-anchor="middle" font-size="10" fill="#2E7D32">ON</text>

  <text x="650" y="245" font-size="10" fill="#555">Attach via relay</text>
  <text x="650" y="258" font-size="10" fill="#555">Register SRP</text>
  <text x="650" y="271" font-size="10" fill="#555">Re-subscribe</text>

  <!-- T=9s SystemOn -->
  <line x1="80" y1="265" x2="750" y2="265" stroke="#4CAF50" stroke-width="2"/>
  <text x="85" y="282" font-size="11" fill="#2E7D32" font-weight="bold">T=9s</text>
  <text x="750" y="282" font-size="11" fill="#2E7D32" font-weight="bold">System ON</text>
</svg>
