<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650" width="950" height="650" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow7" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2C3E50"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#2C3E50"/>
    </marker>
    <marker id="arrowRBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4A90D9"/>
    </marker>
    <marker id="arrowLBlue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#4A90D9"/>
    </marker>
    <marker id="arrowROrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E8A838"/>
    </marker>
    <marker id="arrowLOrange" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#E8A838"/>
    </marker>
    <marker id="arrowLGreen" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#5BB55B"/>
    </marker>
    <marker id="arrowRGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5BB55B"/>
    </marker>
    <marker id="arrowRRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E74C3C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="650" fill="#F7F9FC" rx="8"/>

  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C3E50">Data Flow: Remote Door Unlock Command</text>

  <!-- Swim lane headers -->
  <!-- Lane 1: Dispatch App -->
  <rect x="25" y="42" width="195" height="36" rx="8" fill="#4A90D9" filter="url(#shadow7)"/>
  <text x="122" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Dispatch App</text>

  <!-- Lane 2: Cloud Gateway -->
  <rect x="250" y="42" width="195" height="36" rx="8" fill="#4A90D9" filter="url(#shadow7)"/>
  <text x="347" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Cloud Gateway</text>

  <!-- Lane 3: Border Router -->
  <rect x="475" y="42" width="195" height="36" rx="8" fill="#5BB55B" filter="url(#shadow7)"/>
  <text x="572" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Border Router</text>

  <!-- Lane 4: Door Lock -->
  <rect x="700" y="42" width="220" height="36" rx="8" fill="#E8A838" filter="url(#shadow7)"/>
  <text x="810" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Door Lock (EP:1)</text>

  <!-- Swim lane vertical lines -->
  <line x1="122" y1="78" x2="122" y2="635" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="347" y1="78" x2="347" y2="635" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="572" y1="78" x2="572" y2="635" stroke="#5BB55B" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="810" y1="78" x2="810" y2="635" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- Step 1: App -> Cloud -->
  <line x1="144" y1="100" x2="325" y2="100" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowRBlue)"/>
  <rect x="140" y="86" width="190" height="30" rx="5" fill="white" stroke="#4A90D9" stroke-width="1" opacity="0.92"/>
  <text x="152" y="103" font-size="10" font-weight="bold" fill="#4A90D9">1</text>
  <text x="166" y="103" font-size="9.5" fill="#2C3E50">"Unlock van" (REST API call)</text>

  <!-- Step 2: Cloud processes -->
  <rect x="262" y="124" width="172" height="48" rx="8" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="274" y="141" font-size="10" font-weight="bold" fill="#9B59B6">2</text>
  <text x="288" y="141" font-size="9" fill="#2C3E50">Build Matter InvokeRequest</text>
  <text x="274" y="155" font-size="8.5" fill="#6C7A89" font-family="'Courier New', monospace">EP:1 Cluster:0x0101</text>
  <text x="274" y="166" font-size="8.5" fill="#6C7A89" font-family="'Courier New', monospace">Cmd:UnlockDoor Timed:30s</text>

  <!-- Step 3: Cloud -> BR -->
  <line x1="369" y1="192" x2="550" y2="192" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowRBlue)"/>
  <rect x="370" y="178" width="190" height="30" rx="5" fill="white" stroke="#4A90D9" stroke-width="1" opacity="0.92"/>
  <text x="380" y="196" font-size="10" font-weight="bold" fill="#4A90D9">3</text>
  <text x="394" y="196" font-size="9.5" fill="#2C3E50">Matter over TCP (cellular)</text>

  <!-- Step 4: BR -> Lock -->
  <line x1="594" y1="228" x2="788" y2="228" stroke="#E8A838" stroke-width="2" marker-end="url(#arrowROrange)"/>
  <rect x="580" y="214" width="226" height="30" rx="5" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="592" y="232" font-size="10" font-weight="bold" fill="#E8A838">4</text>
  <text x="606" y="232" font-size="9.5" fill="#2C3E50">802.15.4 mesh via relay, InvokeReq</text>

  <!-- Step 5: Lock actuates -->
  <rect x="730" y="254" width="160" height="40" rx="8" fill="#FFF8E1" stroke="#E8A838" stroke-width="1.5"/>
  <text x="742" y="272" font-size="10" font-weight="bold" fill="#E8A838">5</text>
  <text x="756" y="272" font-size="9.5" fill="#2C3E50">Actuate motor driver</text>
  <text x="756" y="286" font-size="11" font-weight="bold" fill="#5BB55B">UNLOCKED</text>

  <!-- Step 6: Lock -> BR (response) -->
  <line x1="788" y1="314" x2="594" y2="314" stroke="#5BB55B" stroke-width="2" marker-end="url(#arrowLGreen)"/>
  <rect x="590" y="300" width="220" height="30" rx="5" fill="#E8F5E9" stroke="#5BB55B" stroke-width="1"/>
  <text x="602" y="318" font-size="10" font-weight="bold" fill="#5BB55B">6</text>
  <text x="616" y="318" font-size="9.5" fill="#2C3E50">InvokeResponse (status: SUCCESS)</text>

  <!-- Step 7: BR -> Cloud -->
  <line x1="550" y1="350" x2="369" y2="350" stroke="#5BB55B" stroke-width="2" marker-end="url(#arrowLGreen)"/>
  <rect x="366" y="336" width="210" height="30" rx="5" fill="#E8F5E9" stroke="#5BB55B" stroke-width="1"/>
  <text x="378" y="354" font-size="10" font-weight="bold" fill="#5BB55B">7</text>
  <text x="392" y="354" font-size="9.5" fill="#2C3E50">Matter over TCP, InvokeResponse</text>

  <!-- Step 8: Cloud -> App -->
  <line x1="325" y1="386" x2="144" y2="386" stroke="#5BB55B" stroke-width="2" marker-end="url(#arrowLGreen)"/>
  <rect x="130" y="372" width="214" height="30" rx="5" fill="#E8F5E9" stroke="#5BB55B" stroke-width="1"/>
  <text x="142" y="390" font-size="10" font-weight="bold" fill="#5BB55B">8</text>
  <text x="156" y="390" font-size="9.5" fill="#2C3E50">"Door unlocked" (REST response)</text>

  <!-- Separator: time passes -->
  <line x1="30" y1="418" x2="920" y2="418" stroke="#E74C3C" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <rect x="400" y="408" width="150" height="20" rx="4" fill="#F7F9FC"/>
  <text x="475" y="422" text-anchor="middle" font-size="10" fill="#E74C3C" font-style="italic">T + 30 seconds</text>

  <!-- Step 9: Lock auto-relocks -->
  <rect x="720" y="436" width="180" height="48" rx="8" fill="white" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="732" y="454" font-size="10" font-weight="bold" fill="#E74C3C">9</text>
  <text x="746" y="454" font-size="9.5" fill="#2C3E50">Auto-relock</text>
  <text x="746" y="468" font-size="8.5" fill="#6C7A89">(timed invoke expired)</text>
  <text x="746" y="480" font-size="10" font-weight="bold" fill="#E74C3C">LOCKED</text>

  <!-- Step 10: Lock -> BR -> Cloud -> App subscription report chain -->
  <!-- Lock -> BR -->
  <line x1="788" y1="504" x2="594" y2="504" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLOrange)"/>
  <!-- BR -> Cloud -->
  <line x1="550" y1="504" x2="369" y2="504" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLBlue)"/>
  <!-- Cloud -> App -->
  <line x1="325" y1="504" x2="144" y2="504" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLBlue)"/>

  <rect x="260" y="490" width="420" height="30" rx="5" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1"/>
  <text x="272" y="508" font-size="10" font-weight="bold" fill="#9B59B6">10</text>
  <text x="290" y="508" font-size="9.5" fill="#2C3E50">SubscriptionReport (LockState: LOCKED) -- "Door re-locked"</text>

  <!-- Bottom legend -->
  <rect x="25" y="545" width="900" height="50" rx="8" fill="white" stroke="#D5DBE3" stroke-width="1"/>
  <text x="45" y="566" font-size="10" font-weight="bold" fill="#2C3E50">Legend:</text>

  <line x1="105" y1="564" x2="140" y2="564" stroke="#4A90D9" stroke-width="2"/>
  <text x="146" y="567" font-size="9" fill="#2C3E50">Cloud / Cellular</text>

  <line x1="255" y1="564" x2="290" y2="564" stroke="#E8A838" stroke-width="2"/>
  <text x="296" y="567" font-size="9" fill="#2C3E50">Thread mesh (802.15.4)</text>

  <line x1="430" y1="564" x2="465" y2="564" stroke="#5BB55B" stroke-width="2"/>
  <text x="471" y="567" font-size="9" fill="#2C3E50">Success response path</text>

  <line x1="595" y1="564" x2="630" y2="564" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="636" y="567" font-size="9" fill="#2C3E50">Subscription report</text>

  <line x1="760" y1="564" x2="795" y2="564" stroke="#E74C3C" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="801" y="567" font-size="9" fill="#2C3E50">Timed event</text>

  <text x="45" y="584" font-size="8.5" fill="#6C7A89">Cluster 0x0101 = Door Lock | Timed Invoke ensures command expires if not executed within window | Auto-relock is a device-side safety feature</text>
</svg>