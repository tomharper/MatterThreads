<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="monospace" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Power State Machine</text>

  <!-- EngineOn -->
  <rect x="50" y="80" width="160" height="60" rx="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" fill="white" font-weight="bold">EngineOn</text>

  <!-- ShuttingDown -->
  <rect x="270" y="80" width="160" height="60" rx="10" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
  <text x="350" y="115" text-anchor="middle" fill="white" font-weight="bold">ShuttingDown</text>

  <!-- Off -->
  <rect x="490" y="80" width="160" height="60" rx="10" fill="#F44336" stroke="#B71C1C" stroke-width="2"/>
  <text x="570" y="115" text-anchor="middle" fill="white" font-weight="bold">Off</text>

  <!-- Booting -->
  <rect x="270" y="280" width="160" height="60" rx="10" fill="#2196F3" stroke="#0D47A1" stroke-width="2"/>
  <text x="350" y="315" text-anchor="middle" fill="white" font-weight="bold">Booting</text>

  <!-- EngineOn → ShuttingDown -->
  <line x1="210" y1="110" x2="268" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="100" text-anchor="middle" font-size="11" fill="#555">initiateShutdown()</text>
  <text x="240" y="88" text-anchor="middle" font-size="10" fill="#888">(60-90s battery)</text>

  <!-- ShuttingDown → Off (graceful) -->
  <line x1="430" y1="100" x2="488" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="90" text-anchor="middle" font-size="11" fill="#555">all nodes off</text>

  <!-- ShuttingDown → Off (hard cutoff) -->
  <line x1="430" y1="130" x2="488" y2="130" stroke="#B71C1C" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="460" y="155" text-anchor="middle" font-size="11" fill="#B71C1C">hardCutoff()</text>

  <!-- Off → Booting -->
  <line x1="570" y1="142" x2="570" y2="240" stroke="#333" stroke-width="2"/>
  <line x1="570" y1="240" x2="432" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="230" text-anchor="middle" font-size="11" fill="#555">initiateBoot()</text>

  <!-- Booting → EngineOn -->
  <line x1="270" y1="310" x2="130" y2="310" stroke="#333" stroke-width="2"/>
  <line x1="130" y1="310" x2="130" y2="142" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="350" text-anchor="middle" font-size="11" fill="#555">all nodes on</text>

  <!-- Legend -->
  <rect x="50" y="370" width="600" height="25" rx="5" fill="#f5f5f5" stroke="#ddd"/>
  <line x1="70" y1="382" x2="100" y2="382" stroke="#333" stroke-width="2"/>
  <text x="110" y="387" font-size="11" fill="#555">normal transition</text>
  <line x1="250" y1="382" x2="280" y2="382" stroke="#B71C1C" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="290" y="387" font-size="11" fill="#555">emergency (battery dead)</text>
</svg>
