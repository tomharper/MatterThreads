<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" width="950" height="700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <marker id="timeArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7F8C8D"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="700" fill="#F7F9FC" rx="8"/>

  <!-- Title -->
  <text x="475" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Failure Scenarios &amp; Recovery Timelines</text>
  <text x="475" y="52" text-anchor="middle" font-size="11" fill="#7F8C8D">Thread Mesh Resilience Under Real-World Delivery Van Conditions</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- PANEL 1 (top-left): Relay Router Loses Power             -->
  <!-- ════════════════════════════════════════════════════════ -->
  <rect x="20" y="70" width="445" height="280" rx="10" fill="#FFFFFF" stroke="#E8A838" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="20" y="70" width="445" height="32" rx="10" fill="#E8A838"/>
  <rect x="20" y="90" width="445" height="12" fill="#E8A838"/>
  <text x="242" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">1. Relay Router Loses Power</text>
  <!-- Severity badge -->
  <rect x="380" y="112" width="70" height="20" rx="10" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="415" y="126" text-anchor="middle" font-size="9" font-weight="bold" fill="#E8A838">WARNING</text>

  <!-- Timeline axis -->
  <line x1="50" y1="200" x2="430" y2="200" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#timeArrow)"/>
  <text x="438" y="204" font-size="9" fill="#7F8C8D">t</text>

  <!-- T=0s -->
  <line x1="70" y1="192" x2="70" y2="208" stroke="#5BB55B" stroke-width="2"/>
  <text x="70" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#5BB55B">T=0s</text>
  <text x="70" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Normal</text>

  <!-- T=0.1s cranking dip -->
  <line x1="140" y1="192" x2="140" y2="208" stroke="#E74C3C" stroke-width="2"/>
  <text x="140" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">T=0.1s</text>
  <text x="140" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Cranking dip</text>
  <text x="140" y="233" text-anchor="middle" font-size="8" fill="#E74C3C">12V&#x2192;6V</text>

  <!-- T=0.5s voltage recovers -->
  <line x1="230" y1="192" x2="230" y2="208" stroke="#E8A838" stroke-width="2"/>
  <text x="230" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">T=0.5s</text>
  <text x="230" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Voltage</text>
  <text x="230" y="233" text-anchor="middle" font-size="8" fill="#2C3E50">recovers</text>

  <!-- T=1.0s re-attach -->
  <line x1="310" y1="192" x2="310" y2="208" stroke="#4A90D9" stroke-width="2"/>
  <text x="310" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A90D9">T=1.0s</text>
  <text x="310" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Re-attach</text>

  <!-- T=3.0s full mesh restored -->
  <line x1="395" y1="192" x2="395" y2="208" stroke="#5BB55B" stroke-width="2"/>
  <text x="395" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#5BB55B">T=3.0s</text>
  <text x="395" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Full mesh</text>
  <text x="395" y="233" text-anchor="middle" font-size="8" fill="#5BB55B">restored</text>

  <!-- Disruption zone -->
  <rect x="130" y="240" width="130" height="4" rx="2" fill="#E74C3C" opacity="0.3"/>
  <rect x="260" y="240" width="142" height="4" rx="2" fill="#5BB55B" opacity="0.3"/>

  <!-- Voltage curve sketch -->
  <polyline points="70,158 130,158 140,175 150,175 170,160 230,155 310,155 395,155" fill="none" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="60" y="150" font-size="7" fill="#7F8C8D">12V</text>
  <text x="60" y="178" font-size="7" fill="#7F8C8D">6V</text>

  <!-- Summary -->
  <rect x="40" y="256" width="200" height="24" rx="6" fill="#FFF8E1"/>
  <text x="50" y="272" font-size="10" fill="#2C3E50"><tspan font-weight="bold">Total disruption:</tspan> ~3 seconds</text>

  <!-- Panel divider labels -->
  <rect x="40" y="290" width="90" height="18" rx="4" fill="#E8A838" opacity="0.15"/>
  <text x="85" y="303" text-anchor="middle" font-size="8" fill="#E8A838">Cranking Event</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- PANEL 2 (top-right): Cellular Backhaul Lost               -->
  <!-- ════════════════════════════════════════════════════════ -->
  <rect x="485" y="70" width="445" height="280" rx="10" fill="#FFFFFF" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="485" y="70" width="445" height="32" rx="10" fill="#4A90D9"/>
  <rect x="485" y="90" width="445" height="12" fill="#4A90D9"/>
  <text x="707" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">2. Cellular Backhaul Lost</text>
  <!-- Severity badge -->
  <rect x="845" y="112" width="70" height="20" rx="10" fill="#E8F5E9" stroke="#4A90D9" stroke-width="1"/>
  <text x="880" y="126" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A90D9">INFO</text>

  <!-- Timeline axis -->
  <line x1="515" y1="200" x2="895" y2="200" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#timeArrow)"/>
  <text x="903" y="204" font-size="9" fill="#7F8C8D">t</text>

  <!-- T=0s enter tunnel -->
  <line x1="535" y1="192" x2="535" y2="208" stroke="#2C3E50" stroke-width="2"/>
  <text x="535" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#2C3E50">T=0s</text>
  <text x="535" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Enter</text>
  <text x="535" y="233" text-anchor="middle" font-size="8" fill="#2C3E50">tunnel</text>

  <!-- T=0s+ Thread mesh continues -->
  <line x1="620" y1="192" x2="620" y2="208" stroke="#E8A838" stroke-width="2"/>
  <text x="620" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">T=0s+</text>
  <text x="620" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Thread mesh</text>
  <text x="620" y="233" text-anchor="middle" font-size="8" fill="#2C3E50">continues</text>
  <text x="620" y="244" text-anchor="middle" font-size="8" fill="#4A90D9">BR buffers</text>

  <!-- Tunnel zone -->
  <rect x="530" y="145" width="265" height="38" rx="6" fill="#2C3E50" opacity="0.08"/>
  <text x="662" y="163" text-anchor="middle" font-size="9" fill="#7F8C8D" font-style="italic">Tunnel (no cellular signal)</text>

  <!-- T=5min exit tunnel -->
  <line x1="795" y1="192" x2="795" y2="208" stroke="#5BB55B" stroke-width="2"/>
  <text x="795" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#5BB55B">T=5min</text>
  <text x="795" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Exit tunnel</text>

  <!-- T=5m+2s drain buffer -->
  <line x1="860" y1="192" x2="860" y2="208" stroke="#5BB55B" stroke-width="2"/>
  <text x="860" y="188" text-anchor="middle" font-size="8" font-weight="bold" fill="#5BB55B">T+2s</text>
  <text x="860" y="222" text-anchor="middle" font-size="8" fill="#2C3E50">Drain</text>
  <text x="860" y="233" text-anchor="middle" font-size="8" fill="#2C3E50">buffer</text>

  <!-- Thread mesh indicator -->
  <rect x="555" y="158" width="220" height="16" rx="3" fill="#E8A838" opacity="0.2"/>
  <text x="665" y="170" text-anchor="middle" font-size="7" font-weight="bold" fill="#E8A838">Thread mesh fully operational</text>

  <!-- Summary -->
  <rect x="505" y="256" width="240" height="24" rx="6" fill="#E8F5E9"/>
  <text x="515" y="272" font-size="10" fill="#2C3E50"><tspan font-weight="bold">Sensor data loss:</tspan> zero (buffered locally)</text>

  <rect x="505" y="290" width="90" height="18" rx="4" fill="#4A90D9" opacity="0.15"/>
  <text x="550" y="303" text-anchor="middle" font-size="8" fill="#4A90D9">Tunnel Event</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- PANEL 3 (bottom-left): Border Router Crash                 -->
  <!-- ════════════════════════════════════════════════════════ -->
  <rect x="20" y="370" width="445" height="310" rx="10" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="20" y="370" width="445" height="32" rx="10" fill="#E74C3C"/>
  <rect x="20" y="390" width="445" height="12" fill="#E74C3C"/>
  <text x="242" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">3. Border Router Crash</text>
  <!-- Severity badge -->
  <rect x="380" y="412" width="70" height="20" rx="10" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="415" y="426" text-anchor="middle" font-size="9" font-weight="bold" fill="#E74C3C">ERROR</text>

  <!-- Timeline axis -->
  <line x1="50" y1="510" x2="430" y2="510" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#timeArrow)"/>
  <text x="438" y="514" font-size="9" fill="#7F8C8D">t</text>

  <!-- T=0s crash -->
  <line x1="65" y1="502" x2="65" y2="518" stroke="#E74C3C" stroke-width="2"/>
  <text x="65" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">T=0s</text>
  <text x="65" y="530" text-anchor="middle" font-size="8" fill="#E74C3C">Crash</text>
  <!-- Crash symbol -->
  <text x="65" y="546" text-anchor="middle" font-size="14" fill="#E74C3C">&#x2716;</text>

  <!-- T=2s watchdog reset -->
  <line x1="140" y1="502" x2="140" y2="518" stroke="#E8A838" stroke-width="2"/>
  <text x="140" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">T=2s</text>
  <text x="140" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">Watchdog</text>
  <text x="140" y="541" text-anchor="middle" font-size="8" fill="#2C3E50">reset</text>

  <!-- T=4s MLE advertisements -->
  <line x1="225" y1="502" x2="225" y2="518" stroke="#E8A838" stroke-width="2"/>
  <text x="225" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">T=4s</text>
  <text x="225" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">MLE</text>
  <text x="225" y="541" text-anchor="middle" font-size="8" fill="#2C3E50">advertisements</text>

  <!-- T=8s CASE re-established -->
  <line x1="320" y1="502" x2="320" y2="518" stroke="#9B59B6" stroke-width="2"/>
  <text x="320" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#9B59B6">T=8s</text>
  <text x="320" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">CASE</text>
  <text x="320" y="541" text-anchor="middle" font-size="8" fill="#2C3E50">re-established</text>

  <!-- T=10s subscriptions re-created -->
  <line x1="405" y1="502" x2="405" y2="518" stroke="#5BB55B" stroke-width="2"/>
  <text x="405" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#5BB55B">T=10s</text>
  <text x="405" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">Subscriptions</text>
  <text x="405" y="541" text-anchor="middle" font-size="8" fill="#5BB55B">re-created</text>

  <!-- Disruption bar -->
  <rect x="62" y="556" width="346" height="6" rx="3" fill="#E74C3C" opacity="0.15"/>
  <rect x="62" y="556" width="80" height="6" rx="3" fill="#E74C3C" opacity="0.4"/>
  <rect x="142" y="556" width="265" height="6" rx="3" fill="#E8A838" opacity="0.3"/>

  <!-- Recovery steps -->
  <text x="50" y="582" font-size="9" fill="#7F8C8D">Recovery sequence:</text>
  <text x="50" y="596" font-size="9" fill="#2C3E50">1. Hardware watchdog triggers reset</text>
  <text x="50" y="610" font-size="9" fill="#2C3E50">2. Thread stack re-initializes, sends MLE</text>
  <text x="50" y="624" font-size="9" fill="#2C3E50">3. CASE session restored with fabric credentials</text>
  <text x="50" y="638" font-size="9" fill="#2C3E50">4. Matter subscriptions re-created by controller</text>

  <!-- Summary -->
  <rect x="40" y="650" width="220" height="24" rx="6" fill="#FDEDEC"/>
  <text x="50" y="666" font-size="10" fill="#2C3E50"><tspan font-weight="bold">Total disruption:</tspan> ~10 seconds</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- PANEL 4 (bottom-right): Sensor Battery Dies                -->
  <!-- ════════════════════════════════════════════════════════ -->
  <rect x="485" y="370" width="445" height="310" rx="10" fill="#FFFFFF" stroke="#E8A838" stroke-width="2" filter="url(#shadow)"/>
  <!-- Header -->
  <rect x="485" y="370" width="445" height="32" rx="10" fill="#E8A838"/>
  <rect x="485" y="390" width="445" height="12" fill="#E8A838"/>
  <text x="707" y="391" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">4. Sensor Battery Dies</text>
  <!-- Severity badge -->
  <rect x="845" y="412" width="70" height="20" rx="10" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="880" y="426" text-anchor="middle" font-size="9" font-weight="bold" fill="#E8A838">WARNING</text>

  <!-- Battery drain visualization -->
  <!-- Battery outline -->
  <rect x="520" y="450" width="380" height="30" rx="4" fill="none" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="900" y="458" width="6" height="14" rx="2" fill="#7F8C8D"/>
  <!-- Battery fill gradient -->
  <rect x="522" y="452" width="190" height="26" rx="3" fill="#5BB55B" opacity="0.3"/>
  <rect x="522" y="452" width="100" height="26" rx="3" fill="#E8A838" opacity="0.3"/>
  <rect x="522" y="452" width="30" height="26" rx="3" fill="#E74C3C" opacity="0.4"/>
  <text x="540" y="469" font-size="8" font-weight="bold" fill="#E74C3C">2%</text>
  <text x="575" y="469" font-size="8" font-weight="bold" fill="#E8A838">5%</text>
  <text x="700" y="469" font-size="8" fill="#7F8C8D">Battery Level Over Time</text>

  <!-- Timeline axis -->
  <line x1="515" y1="510" x2="895" y2="510" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#timeArrow)"/>
  <text x="903" y="514" font-size="9" fill="#7F8C8D">t</text>

  <!-- T=0 battery 5% -->
  <line x1="545" y1="502" x2="545" y2="518" stroke="#E8A838" stroke-width="2"/>
  <text x="545" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">T=0</text>
  <text x="545" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">Battery 5%</text>
  <text x="545" y="541" text-anchor="middle" font-size="8" fill="#E8A838">Low-battery</text>
  <text x="545" y="552" text-anchor="middle" font-size="8" fill="#E8A838">event</text>

  <!-- T+1h battery 2% -->
  <line x1="680" y1="502" x2="680" y2="518" stroke="#E74C3C" stroke-width="2"/>
  <text x="680" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#E74C3C">T+1h</text>
  <text x="680" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">Battery 2%</text>
  <text x="680" y="541" text-anchor="middle" font-size="8" fill="#E74C3C">Shutdown</text>

  <!-- T+25s parent detects -->
  <line x1="790" y1="502" x2="790" y2="518" stroke="#E8A838" stroke-width="2"/>
  <text x="790" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">T+25s</text>
  <text x="790" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">Parent detects</text>
  <text x="790" y="541" text-anchor="middle" font-size="8" fill="#2C3E50">timeout</text>

  <!-- T+30s BR reports offline -->
  <line x1="865" y1="502" x2="865" y2="518" stroke="#4A90D9" stroke-width="2"/>
  <text x="865" y="498" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A90D9">T+30s</text>
  <text x="865" y="530" text-anchor="middle" font-size="8" fill="#2C3E50">BR reports</text>
  <text x="865" y="541" text-anchor="middle" font-size="8" fill="#4A90D9">offline</text>

  <!-- Alert path -->
  <path d="M 545 556 L 545 570 Q 545 580 555 580 L 850 580 Q 860 580 865 572 L 865 545" fill="none" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="700" y="576" text-anchor="middle" font-size="8" fill="#E74C3C">Event propagation path</text>

  <!-- Recovery note -->
  <rect x="505" y="596" width="190" height="20" rx="4" fill="none" stroke="#7F8C8D" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="515" y="610" font-size="9" fill="#7F8C8D">Recovery: Technician replaces CR2032</text>

  <!-- Sensor icon -->
  <rect x="860" y="596" width="55" height="42" rx="6" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="887" y="614" text-anchor="middle" font-size="8" font-weight="bold" fill="#E8A838">CR2032</text>
  <text x="887" y="628" text-anchor="middle" font-size="16" fill="#E8A838">&#x1F50B;</text>

  <!-- Summary -->
  <rect x="505" y="650" width="250" height="24" rx="6" fill="#FFF8E1"/>
  <text x="515" y="666" font-size="10" fill="#2C3E50"><tspan font-weight="bold">Detection time:</tspan> ~30s after shutdown</text>
</svg>