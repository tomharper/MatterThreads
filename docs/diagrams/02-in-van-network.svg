<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#BDC3C7" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8A838"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="5" refY="0" orient="270">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">In-Van Network Architecture</text>

  <!-- Outer Van Box -->
  <rect x="20" y="42" width="860" height="500" rx="14" ry="14" fill="#E8F5E9" stroke="#5BB55B" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#5BB55B">DELIVERY VAN</text>

  <!-- CLOUD label above -->
  <rect x="80" y="4" width="100" height="24" rx="4" ry="4" fill="#F7F9FC" stroke="#4A90D9" stroke-width="1"/>
  <text x="130" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A90D9">CLOUD</text>

  <!-- LTE-M arrow going up from BR to Cloud -->
  <line x1="165" y1="42" x2="165" y2="16" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowUp)"/>
  <text x="210" y="35" font-size="9" fill="#4A90D9" font-weight="bold">LTE-M Backhaul</text>
  <text x="210" y="14" font-size="8" fill="#7F8C8D">IPv6 / Matter</text>

  <!-- CAB Section -->
  <rect x="40" y="78" width="280" height="355" rx="10" ry="10" fill="#FFFFFF" stroke="#5BB55B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="180" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#5BB55B">CAB</text>

  <!-- Border Router box -->
  <rect x="55" y="110" width="250" height="200" rx="10" ry="10" fill="#FFF8E1" stroke="#E8A838" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#E8A838">BORDER ROUTER</text>
  <text x="180" y="148" text-anchor="middle" font-size="10" fill="#2C3E50">Node 0 / Thread Leader</text>

  <!-- nRF5340 -->
  <rect x="70" y="160" width="220" height="38" rx="6" ry="6" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="1"/>
  <text x="180" y="177" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">nRF5340</text>
  <text x="180" y="192" text-anchor="middle" font-size="9" fill="#7F8C8D">Dual-core: App + Network</text>

  <!-- Quectel BG95-M3 -->
  <rect x="70" y="206" width="220" height="38" rx="6" ry="6" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="1"/>
  <text x="180" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">Quectel BG95-M3</text>
  <text x="180" y="238" text-anchor="middle" font-size="9" fill="#7F8C8D">LTE-M Cellular Modem</text>

  <!-- Secure Element -->
  <rect x="70" y="252" width="220" height="38" rx="6" ry="6" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1"/>
  <text x="180" y="269" text-anchor="middle" font-size="11" font-weight="bold" fill="#9B59B6">Secure Element</text>
  <text x="180" y="284" text-anchor="middle" font-size="9" fill="#7F8C8D">CASE keys, DAC, NOC</text>

  <!-- Thread antenna icon text -->
  <text x="180" y="325" text-anchor="middle" font-size="9" fill="#E8A838" font-weight="bold">802.15.4 Radio (250 kbps)</text>

  <!-- CARGO BAY Section -->
  <rect x="350" y="78" width="510" height="355" rx="10" ry="10" fill="#FFFFFF" stroke="#5BB55B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="605" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#5BB55B">CARGO BAY</text>

  <!-- Relay Router box -->
  <rect x="370" y="110" width="200" height="100" rx="10" ry="10" fill="#FFF8E1" stroke="#E8A838" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#E8A838">RELAY ROUTER</text>
  <text x="470" y="148" text-anchor="middle" font-size="10" fill="#2C3E50">Node 1 / Router</text>
  <rect x="385" y="160" width="170" height="35" rx="6" ry="6" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="1"/>
  <text x="470" y="177" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">nRF52840</text>
  <text x="470" y="190" text-anchor="middle" font-size="9" fill="#7F8C8D">Thread Router SoC</text>

  <!-- Thread mesh line: BR to Relay -->
  <line x1="305" y1="160" x2="370" y2="160" stroke="#E8A838" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowRight)"/>
  <text x="337" y="152" text-anchor="middle" font-size="8" fill="#E8A838" font-weight="bold">Thread</text>
  <text x="337" y="172" text-anchor="middle" font-size="7" fill="#7F8C8D">802.15.4</text>

  <!-- Sensor boxes - Row 1 -->
  <!-- Door Lock EP:1 -->
  <rect x="370" y="235" width="110" height="52" rx="7" ry="7" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="254" text-anchor="middle" font-size="10" font-weight="bold" fill="#9B59B6">Door Lock</text>
  <text x="425" y="268" text-anchor="middle" font-size="9" fill="#2C3E50">EP:1</text>
  <text x="425" y="281" text-anchor="middle" font-size="8" fill="#7F8C8D">MED</text>

  <!-- Temp EP:2 -->
  <rect x="495" y="235" width="110" height="52" rx="7" ry="7" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="254" text-anchor="middle" font-size="10" font-weight="bold" fill="#9B59B6">Temp Sensor</text>
  <text x="550" y="268" text-anchor="middle" font-size="9" fill="#2C3E50">EP:2</text>
  <text x="550" y="281" text-anchor="middle" font-size="8" fill="#7F8C8D">MED</text>

  <!-- Humidity EP:3 -->
  <rect x="620" y="235" width="110" height="52" rx="7" ry="7" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="254" text-anchor="middle" font-size="10" font-weight="bold" fill="#9B59B6">Humidity</text>
  <text x="675" y="268" text-anchor="middle" font-size="9" fill="#2C3E50">EP:3</text>
  <text x="675" y="281" text-anchor="middle" font-size="8" fill="#7F8C8D">MED</text>

  <!-- Sensor boxes - Row 2 -->
  <!-- Door Contact EP:4 (SED) -->
  <rect x="370" y="300" width="110" height="52" rx="7" ry="7" fill="#FFF8E1" stroke="#E8A838" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="319" text-anchor="middle" font-size="10" font-weight="bold" fill="#E8A838">Door Contact</text>
  <text x="425" y="333" text-anchor="middle" font-size="9" fill="#2C3E50">EP:4</text>
  <text x="425" y="346" text-anchor="middle" font-size="8" fill="#E74C3C" font-weight="bold">SED</text>

  <!-- Light EP:5 -->
  <rect x="495" y="300" width="110" height="52" rx="7" ry="7" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="319" text-anchor="middle" font-size="10" font-weight="bold" fill="#9B59B6">Light Sensor</text>
  <text x="550" y="333" text-anchor="middle" font-size="9" fill="#2C3E50">EP:5</text>
  <text x="550" y="346" text-anchor="middle" font-size="8" fill="#7F8C8D">MED</text>

  <!-- Occupancy EP:6 (SED) -->
  <rect x="620" y="300" width="110" height="52" rx="7" ry="7" fill="#FFF8E1" stroke="#E8A838" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="319" text-anchor="middle" font-size="10" font-weight="bold" fill="#E8A838">Occupancy</text>
  <text x="675" y="333" text-anchor="middle" font-size="9" fill="#2C3E50">EP:6</text>
  <text x="675" y="346" text-anchor="middle" font-size="8" fill="#E74C3C" font-weight="bold">SED</text>

  <!-- Thread mesh lines: Relay to Sensors -->
  <line x1="470" y1="210" x2="425" y2="235" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="470" y1="210" x2="550" y2="235" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="470" y1="210" x2="675" y2="235" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="425" y1="287" x2="425" y2="300" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="550" y1="287" x2="550" y2="300" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="675" y1="287" x2="675" y2="300" stroke="#E8A838" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Thread mesh label -->
  <rect x="730" y="210" width="120" height="20" rx="4" ry="4" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="790" y="224" text-anchor="middle" font-size="9" fill="#E8A838" font-weight="bold">Thread Mesh</text>

  <!-- 12V Vehicle Power Bus -->
  <rect x="40" y="450" width="840" height="35" rx="6" ry="6" fill="#F7F9FC" stroke="#BDC3C7" stroke-width="2"/>
  <text x="450" y="472" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">12V Vehicle Power Bus</text>

  <!-- Power lines up from bus -->
  <line x1="180" y1="450" x2="180" y2="433" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="470" y1="450" x2="470" y2="433" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="550" y1="450" x2="550" y2="433" stroke="#BDC3C7" stroke-width="1.5"/>
  <line x1="675" y1="450" x2="675" y2="433" stroke="#BDC3C7" stroke-width="1.5"/>

  <!-- Power labels -->
  <text x="180" y="428" text-anchor="middle" font-size="8" fill="#7F8C8D">5V reg</text>
  <text x="470" y="428" text-anchor="middle" font-size="8" fill="#7F8C8D">3.3V</text>
  <text x="550" y="428" text-anchor="middle" font-size="8" fill="#7F8C8D">3.3V</text>
  <text x="675" y="428" text-anchor="middle" font-size="8" fill="#7F8C8D">Battery</text>

  <!-- Legend -->
  <rect x="40" y="500" width="860" height="45" rx="6" ry="6" fill="#F7F9FC" stroke="#BDC3C7" stroke-width="1"/>
  <text x="60" y="520" font-size="9" font-weight="bold" fill="#2C3E50">Legend:</text>
  <rect x="110" y="510" width="12" height="12" rx="2" ry="2" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="128" y="520" font-size="9" fill="#2C3E50">Thread Router</text>
  <rect x="220" y="510" width="12" height="12" rx="2" ry="2" fill="#F3E5F5" stroke="#9B59B6" stroke-width="1"/>
  <text x="238" y="520" font-size="9" fill="#2C3E50">Matter Endpoint (MED)</text>
  <rect x="370" y="510" width="12" height="12" rx="2" ry="2" fill="#FFF8E1" stroke="#E8A838" stroke-width="1"/>
  <text x="388" y="520" font-size="9" fill="#2C3E50">Sleepy End Device (SED)</text>
  <line x1="540" y1="516" x2="575" y2="516" stroke="#E8A838" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="582" y="520" font-size="9" fill="#2C3E50">802.15.4 Thread Link</text>
  <line x1="700" y1="516" x2="735" y2="516" stroke="#4A90D9" stroke-width="2"/>
  <text x="742" y="520" font-size="9" fill="#2C3E50">LTE-M Cellular</text>
</svg>